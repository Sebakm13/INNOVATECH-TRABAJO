name: Pipeline CI/CD Monorepo Innovatech

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Autenticar en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compilar y subir Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest ./Innovatech-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

      - name: Compilar y subir Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest ./Innovatech-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Checkout del codigo para despliegue
        uses: actions/checkout@v3

      - name: Copiar Docker Compose al servidor AWS
        uses: appleboy/scp-action@v0.1.4
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          source: "docker-compose.yml"
          target: "/home/ubuntu/innovatech-app" # <-- Ruta absoluta corregida sin la virgulilla (~)

      - name: Ejecutar Docker Compose via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # Asegurar que la carpeta exista antes de entrar
            mkdir -p /home/ubuntu/innovatech-app
            cd /home/ubuntu/innovatech-app
            
            # Exportar el usuario de docker de forma segura para el archivo compose
            export DOCKER_USERNAME="${{ secrets.DOCKER_USERNAME }}"
            
            # Autenticar, actualizar imágenes y levantar stack
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            docker compose pull
            docker compose down || true
            docker compose up -d