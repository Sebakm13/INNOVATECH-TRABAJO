version: '3.8'

services:
  base_datos:
    image: mysql:8.0
    container_name: bd_innovatech
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: innovatech_metadata
      MYSQL_USER: user_innova
      MYSQL_PASSWORD: password_innova
    ports:
      - "3306:3306"
    volumes:
      - mysql_datos:/var/lib/mysql
    networks:
      - red_interna

  api_backend:
    build: .
    container_name: api_innovatech
    restart: always
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - DB_HOST=base_datos
      - DB_USER=user_innova
      - DB_PASSWORD=password_innova
      - DB_NAME=innovatech_metadata
    depends_on:
      - base_datos
    networks:
      - red_interna

volumes:
  mysql_datos:

networks:
  red_interna:
    driver: bridge