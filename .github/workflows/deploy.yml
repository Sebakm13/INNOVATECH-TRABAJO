name: Deploy Innovatech to AWS

on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v3

    - name: Deploy to AWS EC2 via SSH
      uses: appleboy/ssh-action@master
      with:
        host: ${{ secrets.AWS_HOST }}
        username: ${{ secrets.AWS_USER }}
        key: ${{ secrets.AWS_KEY }}
        script: |
          cd /home/ubuntu/proyecto-innovatech-unico || mkdir -p /home/ubuntu/proyecto-innovatech-unico && cd /home/ubuntu/proyecto-innovatech-unico
          # Aquí tu pipeline clonará o moverá los archivos y levantará docker-compose
          echo "Desplegando contenedores en AWS..."
