name: Pipeline CI/CD Monorepo Innovatech

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout del codigo
        uses: actions/checkout@v3

      - name: Autenticar en Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Compilar y subir Frontend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest ./Innovatech-frontend
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest

      - name: Compilar y subir Backend
        run: |
          docker build -t ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest ./Innovatech-backend
          docker push ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest

  deploy-to-aws:
    runs-on: ubuntu-latest
    needs: build-and-push
    steps:
      - name: Ejecutar Despliegue con Docker Compose via SSH
        uses: appleboy/ssh-action@v0.1.10
        with:
          host: ${{ secrets.AWS_HOST }}
          username: ${{ secrets.AWS_USER }}
          key: ${{ secrets.AWS_SSH_KEY }}
          script: |
            # 1. Asegurar que la carpeta exista en AWS y entrar en ella
            mkdir -p /home/ubuntu/innovatech-app
            cd /home/ubuntu/innovatech-app
            
            # 2. Escribir el docker-compose directamente en el servidor AWS (Solución limpia y robusta)
            cat << 'EOF' > docker-compose.yml
            version: "3.8"

            services:
              innovatech-back:
                image: ${{ secrets.DOCKER_USERNAME }}/innovatech-backend:latest
                container_name: innovatech-back
                ports:
                  - "8080:8080"
                environment:
                  - MONGO_URI=mongodb://mongo-db:27017/innovatech
                networks:
                  - innovatech-net
                depends_on:
                  - mongo-db

              innovatech-front:
                image: ${{ secrets.DOCKER_USERNAME }}/innovatech-frontend:latest
                container_name: innovatech-front
                ports:
                  - "80:80"
                networks:
                  - innovatech-net

              mongo-db:
                image: mongo:latest
                container_name: mongo-db
                networks:
                  - innovatech-net
                volumes:
                  - mongo-data:/data/db

            networks:
              innovatech-net:
                driver: bridge

            volumes:
              mongo-data:
            EOF

            # 3. Iniciar sesión en Docker Hub desde AWS
            docker login -u ${{ secrets.DOCKER_USERNAME }} -p ${{ secrets.DOCKER_PASSWORD }}
            
            # 4. Actualizar las imágenes nuevas, detener el stack viejo y encender el nuevo
            docker compose pull
            docker compose down || true
            docker compose up -d